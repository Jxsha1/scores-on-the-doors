<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores on the Doors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .stamp-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="SOTD_Logo.png" alt="SOTD Logo" class="w-10 h-10 rounded-full bg-white p-1 object-contain shadow-sm">
            <h1 class="text-xl font-bold tracking-tight">Scores on the Doors</h1>
        </div>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition text-white">Sign In</button>
    </nav>

    <main class="max-w-md mx-auto mt-6 p-4 pb-32">
        <div class="flex border-b border-gray-200 mb-6 sticky top-0 bg-gray-100 z-10">
            <button id="tab-fixtures" class="flex-1 py-3 font-bold border-b-2 border-blue-900 text-blue-900">Fixtures</button>
            <button id="tab-leaderboard" class="flex-1 py-3 font-bold border-b-2 border-transparent text-gray-400 hover:text-blue-900">Leaderboard</button>
            <button id="tab-admin" class="flex-1 py-3 font-bold border-b-2 border-transparent text-red-500 hover:text-red-700">Admin</button>
        </div>

        <section id="section-fixtures">
            <p id="user-status-msg" class="text-center text-sm text-gray-500 mb-4 italic">Loading matches...</p>
            <div id="fixtures-container" class="space-y-6"></div>
        </section>

        <section id="section-leaderboard" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                        <tr><th class="px-6 py-4">Rank</th><th class="px-6 py-4">User</th><th class="px-6 py-4 text-right">Pts</th></tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <section id="section-admin" class="hidden">
            <div class="bg-blue-50 p-5 rounded-xl border border-blue-200 mb-6 shadow-sm">
                <h3 class="font-bold text-blue-900 mb-2">
