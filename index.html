<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores on the Doors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .stamp-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="SOTD_Logo.png" alt="SOTD Logo" class="w-10 h-10 rounded-full bg-white p-1 object-contain shadow-sm" onerror="this.src='https://via.placeholder.com/40'">
            <h1 class="text-xl font-bold tracking-tight">Scores on the Doors</h1>
        </div>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition text-white">Sign In</button>
    </nav>

    <main class="max-w-md mx-auto mt-6 p-4 pb-32">
        <div class="flex border-b border-gray-200 mb-6 sticky top-0 bg-gray-100 z-20">
            <button id="tab-fixtures" class="flex-1 py-3 font-bold border-b-2 border-blue-900 text-blue-900 transition-colors">Fixtures</button>
            <button id="tab-leaderboard" class="flex-1 py-3 font-bold border-b-2 border-transparent text-gray-400 hover:text-blue-900 transition-colors">Leaderboard</button>
            <button id="tab-admin" class="flex-1 py-3 font-bold border-b-2 border-transparent text-red-500 hover:text-red-700 transition-colors">Admin</button>
        </div>

        <section id="section-fixtures">
            <div class="flex justify-center mb-6 space-x-2 bg-gray-200 p-1 rounded-full w-fit mx-auto">
                <button id="sub-upcoming" class="px-5 py-1.5 text-xs font-bold bg-white text-blue-900 rounded-full shadow-sm transition-all">To Predict</button>
                <button id="sub-results" class="px-5 py-1.5 text-xs font-bold text-gray-500 hover:text-blue-900 rounded-full transition-all">Results</button>
            </div>

            <p id="user-status-msg" class="text-center text-sm text-gray-500 mb-4 italic">Loading matches...</p>
            <div id="fixtures-container" class="space-y-6"></div>
        </section>

        <section id="section-leaderboard" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                        <tr><th class="px-6 py-4">Rank</th><th class="px-6 py-4">User</th><th class="px-6 py-4 text-right">Pts</th></tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <section id="section-admin" class="hidden">
            <div class="bg-blue-50 p-5 rounded-xl border border-blue-200 mb-6 shadow-sm">
                <h3 class="font-bold text-blue-900 mb-2">Live API Sync Hub</h3>
                <p class="text-xs text-blue-700 mb-3">Pulls all matches from the <strong>last 14 days</strong> and the <strong>next 21 days</strong>, auto-calculating all points.</p>
                <input type="password" id="api-key-input" placeholder="Paste your API Token here" class="w-full px-3 py-2 text-sm border border-blue-200 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                <button id="sync-api-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg text-sm shadow transition-all">
                    Sync Rolling Window & Update Scores
                </button>
            </div>

            <div class="bg-red-50 p-4 rounded-xl border border-red-200 mb-4 shadow-sm">
                <h3 class="font-bold text-red-800 mb-1 text-sm">Manual Score Entry</h3>
                <p class="text-xs text-red-600">Enter final results here to calculate points manually.</p>
            </div>
            <div id="admin-fixtures-container" class="space-y-4"></div>
        </section>

        <div id="sticky-footer" class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 flex justify-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] transition-transform duration-300">
            <button id="submit-predictions-btn" disabled class="w-full max-w-md bg-gray-400 text-white font-bold py-4 rounded-2xl opacity-50 cursor-not-allowed transition-all">
                Checking Status...
            </button>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-96 max-w-[95%] max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black mb-6 text-center text-blue-900" id="auth-title">Welcome Back</h3>
            <form id="auth-form" class="space-y-3">
                <div id="signup-fields" class="hidden space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="auth-first-name" placeholder="First Name" class="w-1/2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="auth-last-name" placeholder="Last Name" class="w-1/2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <input type="text" id="auth-fav-team" placeholder="Favourite Team (e.g. Arsenal)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="auth-fav-sport" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Football">Football</option>
                        <option value="Rugby">Rugby</option>
                        <option value="Basketball">Basketball</option>
                    </select>
                </div>
                <input type="email" id="auth-email" placeholder="Email" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="password" id="auth-password" placeholder="Password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition mt-2">Sign In</button>
            </form>
            <button id="toggle-auth-mode" class="mt-6 text-blue-600 text-xs font-bold uppercase tracking-widest w-full text-center hover:underline">New? Create Account</button>
            <button id="close-modal-btn" class="mt-4 w-full text-gray-400 text-xs text-center uppercase tracking-widest font-bold hover:text-gray-600">Close</button>
        </div>
    </div>

    <script src="app.js?v=1.1.12"></script>
</body>
</html>
