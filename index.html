<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores on the Doors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Scores on the Doors</h1>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition">Sign In</button>
    </nav>

    <main class="max-w-md mx-auto mt-6 p-4 pb-32">
        <div class="flex border-b border-gray-200 mb-6 overflow-x-auto">
            <button id="tab-fixtures" class="flex-1 py-2 font-bold border-b-2 border-blue-900 text-blue-900 whitespace-nowrap px-4">Fixtures</button>
            <button id="tab-leaderboard" class="flex-1 py-2 font-bold border-b-2 border-transparent text-gray-400 hover:text-blue-900 whitespace-nowrap px-4">Leaderboard</button>
            <button id="tab-admin" class="flex-1 py-2 font-bold border-b-2 border-transparent text-red-500 hover:text-red-700 whitespace-nowrap px-4">Admin</button>
        </div>

        <section id="section-fixtures">
            <p id="user-status-msg" class="text-center text-sm text-gray-600 mb-4 italic">Sign in to predict.</p>
            <div id="fixtures-container" class="space-y-6"></div>
        </section>

        <section id="section-leaderboard" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200 text-xs font-bold text-gray-400 uppercase">
                        <tr><th class="px-4 py-3">Rank</th><th class="px-4 py-3">User</th><th class="px-4 py-3 text-right">Pts</th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </section>

        <section id="section-admin" class="hidden">
            <div class="bg-red-50 p-4 rounded-lg border border-red-200 mb-6">
                <h3 class="font-bold text-red-800 mb-1 text-sm">Manual Score Entry</h3>
                <p class="text-xs text-red-600">Enter real match results here to update the leaderboard.</p>
            </div>
            <div id="admin-fixtures-container" class="space-y-4"></div>
        </section>

        <div id="sticky-footer" class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 flex justify-center shadow-lg">
            <button id="submit-predictions-btn" disabled class="w-full max-w-md bg-gray-400 text-white font-bold py-4 rounded-xl opacity-50 cursor-not-allowed">
                Sign In to Lock In Predictions
            </button>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80">
            <h3 class="text-2xl font-bold mb-4 text-center text-blue-900" id="auth-title">Sign In</h3>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                <input type="password" id="auth-password" placeholder="Password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">Sign In</button>
            </form>
            <button id="toggle-auth-mode" class="mt-4 text-blue-600 text-sm hover:underline w-full text-center">New here? Sign Up</button>
            <button id="close-modal-btn" class="mt-2 w-full text-gray-400 text-xs text-center">Close</button>
        </div>
    </div>

    <script src="app.js?v=1.0.9"></script>
</body>
</html>
