<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores on the Doors | Predict & Win</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Scores on the Doors</h1>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition">
            Sign In
        </button>
    </nav>

    <main class="max-w-md mx-auto mt-6 p-4">
        <header class="text-center mb-8">
            <h2 class="text-2xl font-extrabold mb-2">Gameweek 1</h2>
            <p class="text-sm text-gray-600">Lock in your predictions before kickoff.</p>
        </header>

        <div id="fixtures-container" class="space-y-4">
            <p class="text-center text-gray-500 italic">Loading fixtures...</p>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-96 max-w-[90%]">
            <h3 class="text-2xl font-bold mb-4 text-center text-blue-900" id="auth-title">Sign In</h3>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="auth-email" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="auth-password" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition">Sign In</button>
            </form>

            <div class="mt-4 text-center text-sm">
                <button id="toggle-auth-mode" class="text-blue-600 hover:underline">Need an account? Sign Up</button>
            </div>
            
            <button id="close-modal-btn" class="mt-4 w-full text-gray-500 hover:text-gray-800 text-sm">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
